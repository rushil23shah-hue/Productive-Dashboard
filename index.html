<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productivity Dashboard</title>
<link rel="stylesheet" href="productive.css">
</head>

<body>

<div class="layout">

<!-- Sidebar -->

<div class="sidebar">

<h2 class="logo">⚡ Productive</h2>

<ul>

<li><a href="index.html">🏠 Dashboard</a></li>

<li><a href="to-do.html">✅ Tasks</a></li>

<li><a href="fitness.html">💪 Fitness</a></li>

</ul>

</div>

<!-- Main Content -->

<div class="main">

<header class="header">

<h1>Dashboard</h1>

<button id="themeToggle">Toggle Mode</button>

</header>

<section class="quote-section">

<h2>MILLION DOLLAR KNOWLEDGE</h2>

<p id="quoteText">
"Push yourself, because no one else will do it for you."
</p>

<button id="newQuoteBtn">New Quote</button>

</section>

<section class="dashboard">

<div class="progress-section">

<h2>Daily Progress</h2>

<p>
Tasks Completed:
<span id="tasksCompleted">0</span> /
<span id="tasksTotal">0</span>
</p>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

</div>

<div class="message-section">

<h2>Motivation</h2>

<p id="motivationalMessage">
Start your day by completing a task!
</p>

</div>

</section>

</div>

</div>

</body>
</html>
